<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 동물상 테스트 (강아지 vs 고양이)</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <button id="theme-toggle" title="다크/라이트 모드 전환">🌙</button>
        <h1>AI 동물상 테스트</h1>
        <p class="subtitle">나는 강아지상일까, 고양이상일까?</p>
        
        <div class="test-container">
            <div id="image-upload-area">
                <label for="image-input" class="upload-label">
                    <div id="image-preview-container">
                        <img id="image-preview" src="#" alt="이미지 미리보기" style="display: none;">
                        <div id="upload-placeholder">
                            <span class="icon">📸</span>
                            <span class="text">사진을 업로드하세요</span>
                        </div>
                    </div>
                </label>
                <input type="file" id="image-input" accept="image/*" style="display: none;">
            </div>
            <div id="label-container"></div>
            <p id="loading-msg" style="display: none;">모델 분석 중...</p>
        </div>

        <hr class="divider">

        <div class="contact-section">
            <h2>제휴 문의</h2>
            <form action="https://formspree.io/f/mrerznzo" method="POST" id="contact-form">
                <input type="hidden" name="_subject" value="새로운 동물상 테스트 제휴 문의!">
                <div class="form-group">
                    <label for="name">성함/업체명</label>
                    <input type="text" name="name" id="name" required placeholder="성함 또는 업체명을 입력해주세요">
                </div>
                <div class="form-group">
                    <label for="email">이메일 주소</label>
                    <input type="email" name="_replyto" id="email" required placeholder="contact@example.com">
                </div>
                <div class="form-group">
                    <label for="message">문의 내용</label>
                    <textarea name="message" id="message" rows="4" required placeholder="문의 내용을 상세히 적어주세요"></textarea>
                </div>
                <button type="submit" id="submit-button">문의 보내기</button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <script src="main.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Number Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <button id="theme-toggle" title="Toggle Dark/Light Mode">🌙</button>
        <h1>Lotto Number Generator</h1>
        <div id="numbers-container" class="numbers-container"></div>
        <button id="generate-button">Generate Numbers</button>

        <hr class="divider">

        <div class="contact-section">
            <h2>제휴 문의</h2>
            <form action="https://formspree.io/f/mrerznzo" method="POST" id="contact-form">
                <input type="hidden" name="_subject" value="새로운 제휴 문의가 접수되었습니다!">
                <div class="form-group">
                    <label for="name">성함/업체명</label>
                    <input type="text" name="name" id="name" required placeholder="성함 또는 업체명을 입력해주세요">
                </div>
                <div class="form-group">
                    <label for="email">이메일 주소</label>
                    <input type="email" name="_replyto" id="email" required placeholder="contact@example.com">
                </div>
                <div class="form-group">
                    <label for="message">문의 내용</label>
                    <textarea name="message" id="message" rows="4" required placeholder="문의 내용을 상세히 적어주세요"></textarea>
                </div>
                <!-- Optional: Success redirect -->
                <!-- <input type="hidden" name="_next" value="https://yourdomain.com/thanks.html"> -->
                <button type="submit" id="submit-button">문의 보내기</button>
            </form>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
